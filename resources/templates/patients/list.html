<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2>Patient Management</h2>
                
                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                
                <!-- Action Button -->
                <div class="mb-3">
                    <a th:href="@{/patients/new}" class="btn btn-primary">New Patient</a>
                    <a th:href="@{/prescriptions}" class="btn btn-secondary">Prescriptions</a>
                </div>
                
                <!-- Patients Table -->
                <div class="card">
                    <div class="card-header">
                        <h5>Patients List</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Patient Code</th>
                                        <th>Full Name</th>
                                        <th>Date of Birth</th>
                                        <th>Gender</th>
                                        <th>Phone</th>
                                        <th>Address</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="patient : ${patients}">
                                        <td th:text="${patient.id}"></td>
                                        <td th:text="${patient.patientCode}"></td>
                                        <td th:text="${patient.fullName}"></td>
                                        <td th:text="${#temporals.format(patient.dateOfBirth, 'yyyy-MM-dd')}"></td>
                                        <td th:text="${patient.gender}"></td>
                                        <td th:text="${patient.phone}"></td>
                                        <td th:text="${patient.address}"></td>
                                        <td>
                                            <a th:href="@{/prescriptions/search(patientCode=${patient.patientCode})}" 
                                               class="btn btn-sm btn-info">View Prescriptions</a>
                                            <a th:href="@{/patients/edit/{id}(id=${patient.id})}" 
                                               class="btn btn-sm btn-warning">Edit</a>
                                            <a th:href="@{/patients/delete/{id}(id=${patient.id})}" 
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Are you sure you want to delete this patient?')">Delete</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div th:if="${#lists.isEmpty(patients)}" class="text-center text-muted">
                            No patients found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
