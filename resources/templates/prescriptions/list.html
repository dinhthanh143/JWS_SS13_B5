<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2>Prescription Management</h2>
                
                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                
                <!-- Search Form -->
                <div class="card mb-3">
                    <div class="card-body">
                        <form th:action="@{/prescriptions/search}" method="get" class="row g-3">
                            <div class="col-md-8">
                                <input type="text" name="patientCode" class="form-control" 
                                       placeholder="Enter patient code to search..." required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-primary">Search</button>
                                <a th:href="@{/prescriptions/new}" class="btn btn-success">New Prescription</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Search Results -->
                <div th:if="${searchTerm}" class="alert alert-info">
                    Search results for patient code: <strong th:text="${searchTerm}"></strong>
                    <a th:href="@{/prescriptions}" class="btn btn-sm btn-secondary float-end">Show All</a>
                </div>
                
                <!-- Prescriptions Table -->
                <div class="card">
                    <div class="card-header">
                        <h5>Prescriptions List</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Patient Code</th>
                                    <th>Patient Name</th>
                                    <th>Prescription Date</th>
                                    <th>Doctor</th>
                                    <th>Total Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="prescription : ${prescriptions}">
                                    <td th:text="${prescription.id}"></td>
                                    <td th:text="${prescription.patient.patientCode}"></td>
                                    <td th:text="${prescription.patient.fullName}"></td>
                                    <td th:text="${#temporals.format(prescription.prescriptionDate, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${prescription.doctorName}"></td>
                                    <td th:text="${#numbers.formatDecimal(prescription.totalAmount, 0, 2)} + ' VND'"></td>
                                    <td>
                                        <a th:href="@{/prescriptions/view/{id}(id=${prescription.id})}" 
                                           class="btn btn-sm btn-info">View</a>
                                        <a th:href="@{/prescriptions/edit/{id}(id=${prescription.id})}" 
                                           class="btn btn-sm btn-warning">Edit</a>
                                        <a th:href="@{/prescriptions/delete/{id}(id=${prescription.id})}" 
                                           class="btn btn-sm btn-danger"
                                           onclick="return confirm('Are you sure you want to delete this prescription?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div th:if="${#lists.isEmpty(prescriptions)}" class="text-center text-muted">
                            No prescriptions found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
